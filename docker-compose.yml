services:
  db:
    image: postgres:alpine
    container_name: postgres_prisma_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_prisma_data_test:/var/lib/postgresql/data

volumes:
  postgres_prisma_data_test:
